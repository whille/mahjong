<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页麻将</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tiles.css">
</head>
<body>
  <!-- 竖屏手机战况切换按钮 -->
  <button class="log-toggle-btn" onclick="toggleLogPanel()">📜</button>

  <div class="game-container">
    <header>
      <div class="header-left">
        <button class="restart-btn-small" onclick="initGame()">新局</button>
        <span class="wall-count" id="wall-count-header">136 张</span>
      </div>
      <h1>🀄 网页麻将</h1>
      <div class="config-area">
        <label>超时: <input type="number" id="timeout-setting" value="10" min="5" max="120" step="5">秒</label>
      </div>
    </header>

    <main class="mahjong-table">
      <!-- 对家 (北家) - 上方 -->
      <div class="player-area player-top" id="player-2">
        <div class="hand-back" id="ai2-hand"></div>
        <div class="melds" id="ai2-melds"></div>
      </div>

      <!-- 中间区域: 左家/右家 + 牌池 -->
      <div class="middle-area">
        <!-- 左家 (西家) -->
        <div class="player-area player-left" id="player-3">
          <div class="melds" id="ai3-melds"></div>
          <div class="hand-back vertical" id="ai3-hand"></div>
        </div>

        <!-- 中央弃牌池 -->
        <div class="pool-center" id="pool-center"></div>

        <!-- 右家 (东家) -->
        <div class="player-area player-right" id="player-1">
          <div class="melds" id="ai1-melds"></div>
          <div class="hand-back vertical" id="ai1-hand"></div>
        </div>
      </div>

      <!-- 玩家 (你) - 底部 -->
      <div class="player-area player-self" id="player-0">
        <div class="player-info">
          <span class="player-name">南家(你)</span>
          <span class="player-status" id="player-status"></span>
        </div>
        <!-- 副露区 -->
        <div class="melds" id="player-melds"></div>
        <!-- 手牌 -->
        <div class="hand" id="player-hand"></div>
        <div class="actions" id="player-actions">
          <button class="action-btn" data-action="chi" disabled>吃</button>
          <button class="action-btn" data-action="pong" disabled>碰</button>
          <button class="action-btn" data-action="kong" disabled>杠</button>
          <button class="action-btn" data-action="win" disabled>胡</button>
          <button class="action-btn pass-btn" data-action="pass" disabled>跳过</button>
        </div>
      </div>
    </main>

    <!-- 战况日志 -->
    <div class="log-panel" id="log-panel">
      <h3>战况</h3>
      <div class="log-content" id="message-area"></div>
    </div>

    <!-- 重新开始按钮 -->
    <div class="restart-area" id="restart-area" style="display: none;">
      <button class="restart-btn" onclick="initGame()">重新开始</button>
    </div>

    <!-- 亮牌区域 -->
     id="reveal" class="-area" style="display: none;"></div>

    <!-- 帮助面板 -->
    <div id="help-panel" class="help-panel" style="display: none;">
      <h3>麻将规则</h3>
      <ul>
        <li><strong>胡牌条件</strong>：4组面子 + 1对将牌</li>
        <li><strong>面子</strong>：顺子(123)或刻子(111)</li>
        <li><strong>操作优先级</strong>：胡 杠 > 碰 吃</li>
        <li><strong>番型</strong>：平胡1番、对对胡2番、清一色4番等</li>
      </ul>
      <button onclick="toggleHelp()">关闭</button>
    </div>

    <!-- 吃牌选择面板容器 -->
    <div id="chi-selection-container"></div>
  </div>

  <script src="js/tile.js"></script>
  <script src="js/judge.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
